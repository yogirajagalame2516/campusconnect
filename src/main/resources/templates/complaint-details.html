<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Complaint Details</title>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}

        body{
            font-family:Arial,sans-serif;
            background:#eef2f7;
            color:#1f2937;
            padding:30px;
        }

        .container{
            max-width:900px;
            margin:auto;
        }

        .card{
            background:white;
            padding:35px;
            border-radius:18px;
            box-shadow:0 12px 35px rgba(0,0,0,0.08);
        }

        .top{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
        }

        h1{font-size:28px;color:#111827;}

        .btn{
            background:#2563eb;
            color:white;
            padding:10px 14px;
            border-radius:8px;
            text-decoration:none;
            font-weight:700;
            font-size:14px;
        }

        .grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:18px;
            margin-bottom:25px;
        }

        .item{
            background:#f8fafc;
            padding:16px;
            border-radius:12px;
            border:1px solid #e5e7eb;
        }

        .label{
            font-size:13px;
            color:#6b7280;
            margin-bottom:6px;
            font-weight:700;
        }

        .value{
            font-size:15px;
            color:#111827;
            font-weight:600;
        }

        .section{
            margin-top:20px;
            background:#f8fafc;
            padding:18px;
            border-radius:12px;
            border:1px solid #e5e7eb;
        }

        .section h3{
            margin-bottom:10px;
            font-size:17px;
        }

        .section p{
            line-height:1.6;
            color:#374151;
        }

        .status{
            display:inline-block;
            padding:6px 12px;
            border-radius:999px;
            background:#fef3c7;
            color:#92400e;
            font-weight:700;
            font-size:13px;
        }

        .priority{
            display:inline-block;
            padding:6px 12px;
            border-radius:999px;
            background:#dbeafe;
            color:#1d4ed8;
            font-weight:700;
            font-size:13px;
        }

        @media(max-width:700px){
            .grid{
                grid-template-columns:1fr;
            }

            .top{
                flex-direction:column;
                align-items:flex-start;
                gap:12px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="top">
            <h1>Complaint Details</h1>
            <a href="/admin" class="btn">Back to Dashboard</a>
        </div>

        <div class="grid">

            <div class="item">
                <div class="label">Complaint ID</div>
                <div class="value" th:text="${complaint.complaintId}"></div>
            </div>

            <div class="item">
                <div class="label">Date Submitted</div>
                <div class="value" th:text="${complaint.createdDate}"></div>
            </div>

            <div class="item">
                <div class="label">Student Name</div>
                <div class="value" th:text="${complaint.name}"></div>
            </div>

            <div class="item">
                <div class="label">Email</div>
                <div class="value" th:text="${complaint.email}"></div>
            </div>

            <div class="item">
                <div class="label">Category</div>
                <div class="value" th:text="${complaint.category}"></div>
            </div>

            <div class="item">
                <div class="label">Priority</div>
                <span class="priority" th:text="${complaint.priority}"></span>
            </div>

            <div class="item">
                <div class="label">Status</div>
                <span class="status" th:text="${complaint.status}"></span>
            </div>

        </div>

        <div class="section">
            <h3>Complaint Message</h3>
            <p th:text="${complaint.message}"></p>
        </div>

        <div class="section">
            <h3>Admin Note</h3>
            <p th:text="${complaint.adminNote != null && complaint.adminNote != '' ? complaint.adminNote : '-'}"></p>
        </div>

    </div>

</div>

</body>
</html>
